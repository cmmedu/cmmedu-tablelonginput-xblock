<div class="wrapper-comp-settings is-active editor-with-buttons" id="settings-tab">
  <ul class="list-input settings-list">
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="display_name">Display Name</label>
        <input class="input setting-input" name="display_name" id="display_name" value="{{display_name}}" type="text" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="texto_falso">Texto</label>
        <input class="input setting-input" name="texto_falso" id="texto_falso" value="{{texto_falso}}" type="text" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="weight">Peso</label>
        <input class="input setting-input" name="weight" id="weight" value="{{weight}}" type="number" step="1" min="0" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="nro_de_intentos">Nro. de Intentos</label>
        <input class="input setting-input" name="nro_de_intentos" id="nro_de_intentos" value="{{nro_de_intentos}}" type="number" step="1" min="1" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="area_height">Altura del área de respuesta</label>
        <input class="input setting-input" name="area_height" id="area_height" value="{{area_height}}" type="text" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="numbering_type">Tipo de numeración</label>
        <select class="numbering_type" name="numbering_type">
          <option value="none" {% if numbering_type == 'none' %}selected{% endif %}>
            Sin numeración
          </option>
          <option value="numbers" {% if numbering_type == 'numbers' %}selected{% endif %}>
            1, 2, 3...
          </option>
          <option value="numbers_zero" {% if numbering_type == 'numbers_zero' %}selected{% endif %}>
            0, 1, 2...
          </option>
          <option value="letters" {% if numbering_type == 'letters' %}selected{% endif %}>
            a, b, c...
          </option>
          <option value="roman" {% if numbering_type == 'roman' %}selected{% endif %}>
            i, ii, iii...
          </option>
        </select>
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="texto_header_num">Texto de cabecera de la numeración</label>
        <input class="input setting-input" name="texto_header_num" id="texto_header_num" value="{{texto_header_num}}" type="text" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="pretext_num">Texto antes de la numeración</label>
        <input class="input setting-input" name="pretext_num" id="pretext_num" value="{{pretext_num}}" type="text" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="postext_num">Texto después de la numeración</label>
        <input class="input setting-input" name="postext_num" id="postext_num" value="{{postext_num}}" type="text" />
      </div>
    </li>
    <li class="field comp-setting-entry is-set">
      <div class="wrapper-comp-setting">
        <label class="label setting-label" for="columnas_por_fila">Celdas por fila (sin contar numeración)</label>
        <select class="columnas_por_fila" name="columnas_por_fila" id="columnas_por_fila">
          <option value="1" {% if columnas_por_fila == 1 %}selected{% endif %}>1</option>
          <option value="2" {% if columnas_por_fila == 2 %}selected{% endif %}>2</option>
          <option value="3" {% if columnas_por_fila == 3 %}selected{% endif %}>3</option>
        </select>
      </div>
    </li>
    <li class="field comp-setting-entry is-set" id="listapreguntas">
      <div class="tli-studio-row tli-studio-header-row">
        <div class="tli-studio-row-title">Fila 0</div>
        <div class="wrapper-comp-setting">
          <label class="label setting-label" for="mostrar_header_tabla">
            <input class="input setting-input" name="mostrar_header_tabla" id="mostrar_header_tabla" type="checkbox" {% if mostrar_header_tabla %}checked="checked"{% endif %} />
            Mostrar encabezado en la tabla
          </label>
        </div>
        <div id="tli-studio-header-cells">
          {% for cell in header_cells_studio %}
          <div class="wrapper-comp-setting tli-studio-header-cell" data-col="{{ cell.idx }}">
            <label class="label setting-label" for="header_celda_{{ cell.idx }}">Encabezado columna {{ cell.num }}</label>
            <input class="input setting-input header-celda-input" name="header_celda" id="header_celda_{{ cell.idx }}" data-col="{{ cell.idx }}" type="text" value="{{ cell.text }}" />
          </div>
          {% endfor %}
        </div>
      </div>
      {% for key, value in preguntas %}
        <div class="tli-studio-cell div-pregunta-{{key}}">
          <div class="wrapper-comp-setting">
            <label class="label setting-label" for="tipo_celda">Tipo de celda</label>
            <select class="input setting-input" name="tipo_celda" pregunta-id="{{key}}">
              <option value="texto" {% if value.tipo_celda|default:'input' == 'texto' %}selected{% endif %}>Texto</option>
              <option value="input" {% if value.tipo_celda|default:'input' == 'input' %}selected{% endif %}>Input</option>
            </select>
          </div>
          <div class="wrapper-comp-setting cell-texto-field" pregunta-id="{{key}}">
            <label class="label setting-label" for="texto_celda">Texto</label>
            <input class="input setting-input" name="texto_celda" pregunta-id="{{key}}" value="{{ value.texto_celda|default:value.enunciado }}" type="text" />
          </div>
          <div class="wrapper-comp-setting cell-input-field" pregunta-id="{{key}}">
            <label class="label setting-label" for="texto_input">Texto antes del input (opcional)</label>
            <input class="input setting-input" name="texto_input" pregunta-id="{{key}}" value="{{ value.texto_input|default:value.enunciado }}" type="text" />
          </div>
          <div class="wrapper-comp-setting cell-required-field" pregunta-id="{{key}}">
            <label class="label setting-label" for="obligatoria_{{key}}">
              <input class="input setting-input" name="obligatoria" id="obligatoria_{{key}}" pregunta-id="{{key}}" type="checkbox" {% if value.obligatoria|default:False %}checked{% endif %} />
              Obligatoria
            </label>
          </div>
        </div>
      {% endfor %}
  </li>
  </ul>
  <div class="xblock-actions">
    <ul>
      <li class="action-item">
        <a href="#" class="button action-primary save-button">Save</a>
      </li>
      <li class="action-item">
        <a href="#" class="button cancel-button">Cancel</a>
      </li>
      <li class="action-item">
          <a href="#" class="button add-button">Agregar otra fila</a>
      </li>
    </ul>
  </div>
</div>
